# render.yaml — Render.com Infrastructure-as-Code Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: vellandi-diamonds
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node_modules/.bin/tsx server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: VITE_ADMIN_EMAIL
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/app.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
